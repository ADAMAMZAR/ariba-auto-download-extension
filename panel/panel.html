<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GPO - Automatic Certificate Checker</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h2>⬇ GPO - Automatic Certificate Checker</h2>
    <p class="description">Navigate to the Ariba supplier page, then click the button below to expand all sections and
      download all attachments.</p>

    <button id="download-btn">Download Attachments</button>
    <button id="stop-btn" class="btn-danger" style="display:none;">⏹ Stop</button>

    <div class="checkbox-group">
      <input type="checkbox" id="connect-notebooklm" checked />
      <label for="connect-notebooklm">Upload to NotebookLM after download</label>
    </div>

    <div id="notebooklm-container">
      <div class="input-group">
        <label for="notebooklm-url">NotebookLM Notebook URL</label>
        <input type="url" id="notebooklm-url" placeholder="https://notebooklm.google.com/notebook/..." />
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="delete-after-upload" />
        <label for="delete-after-upload">Delete local files after upload</label>
      </div>
    </div>

    <div class="log-box" id="log-box">
      <div class="log-title">Activity Log</div>
      <div id="log-entries"></div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>

</html>
